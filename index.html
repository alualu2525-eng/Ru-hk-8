<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026港澳吃喝團之小馬哥首航</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3"></script>

<style>
body {margin:0;font-family:sans-serif;}
.bg {
background:url('https://images.unsplash.com/photo-1506973035872-a4f23ef3d6f8') center/cover;
min-height:100vh;
}
.card{
background:rgba(255,255,255,0.9);
border-radius:16px;
padding:16px;
margin-bottom:16px;
}
img{width:100%;border-radius:12px;}
</style>
</head>

<body>
<div id="app" class="bg p-4">

<h1 style="color:white;text-align:center;">
2026港澳吃喝團之小馬哥首航
</h1>

<!-- 天氣 -->
<div class="card">
<h3>🌤 即時天氣</h3>
<div v-if="weather">
香港：{{weather.hk.temp}}°C {{weather.hk.desc}}<br>
澳門：{{weather.mo.temp}}°C {{weather.mo.desc}}
</div>
</div>

<!-- 行程 -->
<div class="card" v-for="p in plans">
<img :src="p.img">
<h3>{{p.name}}</h3>

<p>{{p.desc}}</p>

<p>💰 {{p.cost}}</p>
<p>⏱ {{p.time}}</p>

<button @click="nav(p)">
📍一鍵導航
</button>
</div>

<!-- 行李 -->
<div class="card">
<h3>🎒 行李清單</h3>
<div v-for="b in bag">
<input type="checkbox"> {{b}}<br>
</div>
</div>

</div>

<script>
// 天氣 API
async function getWeather(){
let hk=await fetch("https://api.openweathermap.org/data/2.5/weather?q=HongKong&appid=YOUR_KEY&units=metric");
let mo=await fetch("https://api.openweathermap.org/data/2.5/weather?q=Macau&appid=YOUR_KEY&units=metric");

hk=await hk.json();
mo=await mo.json();

return {
hk:{temp:hk.main.temp,desc:hk.weather[0].main},
mo:{temp:mo.main.temp,desc:mo.weather[0].main}
}
}

const {createApp,ref,onMounted}=Vue;

createApp({
setup(){

const weather=ref(null);

const bag=[
"護照","現金","八達通","充電器",
"行動電源","藥品","雨傘"
];

const plans=[
{
name:"大三巴",
img:"https://images.unsplash.com/photo-1549893079-842e4e4c6d3f",
desc:"看到人潮往上走就是",
cost:"免費",
time:"約1小時",
lat:22.197,
lng:113.541
},
{
name:"禮記雪糕",
img:"https://images.unsplash.com/photo-1563805042-7684c019e1cb",
desc:"大三巴往下3分鐘",
cost:"MOP20",
time:"15分鐘",
lat:22.195,
lng:113.542
}
];

function nav(p){
if(/iPhone/.test(navigator.userAgent)){
window.location.href=`http://maps.apple.com/?ll=${p.lat},${p.lng}`;
}else{
window.location.href=`https://www.google.com/maps?q=${p.lat},${p.lng}`;
}
}

onMounted(async ()=>{
weather.value=await getWeather();
});

return{weather,plans,bag,nav}

}
}).mount("#app");
</script>

<!-- 離線 -->
<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
