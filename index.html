<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026港澳吃喝團</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  font-family: "Noto Sans TC", sans-serif;
  background: #0a192f;
}
.app {
  max-width: 500px;
  margin: auto;
  background: #f8fafc;
  min-height: 100vh;
  padding-bottom: 80px;
}
.banner {
  background: #0a192f;
  color: white;
  text-align: center;
  padding: 30px;
  border-bottom-left-radius: 40px;
  border-bottom-right-radius: 40px;
}
.content {
  margin-top: -30px;
  background: #f8fafc;
  border-radius: 30px;
  padding: 15px;
}
.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 500px;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
</style>
</head>

<body>
<div id="app" class="app">

  <!-- Banner -->
  <div class="banner">
    <h1 class="text-xl font-bold">
      2026港澳吃喝團<br>之小馬哥首航
    </h1>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Tabs -->
    <div class="flex justify-around mb-3">
      <button @click="tab='plan'">📍行程</button>
      <button @click="tab='info'">ℹ️資訊</button>
      <button @click="tab='shop'">🛒購物</button>
      <button @click="tab='money'">💰花費</button>
    </div>

    <!-- 行程 -->
    <div v-if="tab==='plan'">

      <!-- 天氣 -->
      <div class="card text-center">
        ☀️ 30°C / 體感 33°C
      </div>

      <div v-for="item in itinerary" class="card" @click="go(item.name)">
        <div class="text-sm text-blue-500">{{item.type}}</div>
        <div class="font-bold">{{item.name}}</div>
        <div class="text-xs text-gray-500">{{item.note}}</div>
      </div>

      <button @click="addPlan" class="fixed bottom-20 right-5 bg-blue-600 text-white rounded-full w-12 h-12 text-xl">+</button>
    </div>

    <!-- 資訊 -->
    <div v-if="tab==='info'">
      <div class="card">
        ✈️ 航班：HB703 → 香港
      </div>
      <div class="card">
        🏨 香港住宿：旭逸酒店 荃灣
      </div>
      <div class="card">
        🏨 澳門住宿：利澳酒店
      </div>

      <div class="card">
        💱 匯率換算
        <input v-model="hkd" placeholder="輸入港幣" class="border p-1 w-full mt-2">
        👉 約 NTD {{hkd*4}}
      </div>
    </div>

    <!-- 購物 -->
    <div v-if="tab==='shop'">
      <div v-for="s in shopList" class="card">
        {{s}}
      </div>
      <button @click="addShop" class="fixed bottom-20 right-5 bg-blue-600 text-white rounded-full w-12 h-12">+</button>
    </div>

    <!-- 花費 -->
    <div v-if="tab==='money'">
      <div class="card">
        總花費：{{total}}
      </div>

      <div v-for="m in money" class="card">
        {{m.name}} - {{m.price}}
      </div>

      <button @click="addMoney" class="fixed bottom-20 right-5 bg-blue-600 text-white rounded-full w-12 h-12">+</button>
    </div>

  </div>

  <!-- 底部 -->
  <div class="tabbar">
    <i data-lucide="map"></i>
    <i data-lucide="info"></i>
    <i data-lucide="shopping-basket"></i>
    <i data-lucide="wallet"></i>
  </div>

</div>

<script>
const {createApp, ref, computed} = Vue

createApp({
setup(){

const tab = ref("plan")

const itinerary = ref([
  {type:"航班", name:"香港機場", note:"13:30 抵達"},
  {type:"購物", name:"東薈城", note:"COACH outlet"},
  {type:"住宿", name:"旭逸酒店", note:"荃灣"},
])

const shopList = ref(["COACH包","曲奇餅"])

const money = ref([
  {name:"交通", price:100},
  {name:"餐飲", price:200}
])

const total = computed(()=>{
  return money.value.reduce((a,b)=>a+b.price,0)
})

const hkd = ref(0)

const go = (q)=>{
  window.open("https://www.google.com/maps/search/"+q)
}

const addPlan = ()=>{
  const name = prompt("新增行程")
  if(name) itinerary.value.push({type:"其他",name, note:""})
}

const addShop = ()=>{
  const name = prompt("買什麼")
  if(name) shopList.value.push(name)
}

const addMoney = ()=>{
  const name = prompt("項目")
  const price = prompt("金額")
  if(name && price){
    money.value.push({name, price: Number(price)})
  }
}

return {tab,itinerary,shopList,money,total,hkd,go,addPlan,addShop,addMoney}
}
}).mount("#app")

lucide.createIcons()
</script>

</body>
</html>
